<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .topbar {
            background: #0d6efd;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 30px;
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar d-flex justify-content-between">
    <span>Community Service</span>
    <a href="/logout/" class="btn btn-light btn-sm">Logout</a>
</div>

<div class="container mt-4">

    <h3 class="mb-4">Welcome, {{ request.user.username }}</h3>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-4 text-center bg-white" onclick="location.href='/tasks/'">
                <div class="icon">📚</div>
                <h5 class="mt-2">tasks</h5>
                <p>Track progress</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-white" onclick="location.href='/solution/'">
                <div class="icon">🗓</div>
                <h5 class="mt-2">Solution</h5>
                <p>View timetable</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-white" onclick="location.href='/reminders/'">
                <div class="icon">⏰</div>
                <h5 class="mt-2">Reminders</h5>
                <p>Manage tasks</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center bg-white" onclick="location.href='/feedback/'">
                <div class="icon">💚</div>
                <h5 class="mt-2">feedback</h5>
                <p>Check community status</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
