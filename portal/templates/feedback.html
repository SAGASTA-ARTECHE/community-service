<!DOCTYPE html>
<html>
<head>
    <title>feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .topbar {
            background: #0d6efd;
            color: white;
            padding: 15px;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar d-flex justify-content-between">
    <h4>Wellness Check-in</h4>
    <a href="/dashboard/" class="btn btn-light">Back</a>
</div>

<div class="container mt-4">

    <div class="card p-4 shadow">
        <h5>Hare we productive?</h5>
        <p class="text-muted">Tell us your suggestion</p>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label>Mood</label>
                <input type="text" name="mood" class="form-control" placeholder="Happy / Stressed / Tired" required>
            </div>

            <div class="mb-3">
                <label>Notes</label>
                <textarea name="note" class="form-control" rows="3"></textarea>
            </div>

            <button class="btn btn-info w-100">Submit</button>
        </form>
    </div>

</div>

</body>
</html>
