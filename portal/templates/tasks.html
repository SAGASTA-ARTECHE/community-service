<!DOCTYPE html>
<html>
<head>
    <title>tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="bg-primary text-white p-3 d-flex justify-content-between">
    <h4>tasks</h4>
    <a href="/dashboard/" class="btn btn-light">Back</a>
</div>

<div class="container mt-4">

{% for a tasks %}
<div class="card p-3 mb-3 shadow-sm">
    <h5>{{ a.title }}</h5>
    <p>Due: {{ a.due_date }}</p>

    <div class="progress">
        <div class="progress-bar bg-success" style="width: 70%">
            {{ a.status }}
        </div>
    </div>
</div>
{% empty %}
<p>No tasks yet</p>
{% endfor %}

</div>

</body>
</html>
